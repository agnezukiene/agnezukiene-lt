<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1460" viewBox="0 0 1600 1460" role="img" aria-labelledby="title desc">
  <title id="title">Šviesūs smėlio ir pieno baltumo svetainės spalvų variantai</title>
  <desc id="desc">Keturi šviesūs Agnės Žukienės psichologės svetainės spalvų variantai pagal grafito ir medaus kryptį, bet be juodų ir pilkų dominančių tonų.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7a6042" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { font: 740 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { font: 560 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .body { font: 410 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .h1 { font: 760 39px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .button { font: 720 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1460" fill="#fbf8f1"/>
  <text x="80" y="78" class="label" fill="#5d4631">Šviesios smėlio krypties variantai</text>
  <text x="80" y="114" class="body" fill="#8a745e">Pagal tau patikusį 5 variantą, bet šviesiau: pieno baltumas, smėlis, avižos, šiltas molis, be juodos/pilkos dominavimo.</text>

  <!-- A -->
  <g transform="translate(80,170)" filter="url(#shadow)">
    <rect width="1440" height="285" rx="12" fill="#f5ecdd"/>
    <rect x="36" y="34" width="430" height="217" rx="8" fill="#fffdf8"/>
    <rect x="0" y="0" width="1440" height="285" rx="12" fill="none" stroke="#e5d6c1"/>
    <text x="36" y="-22" class="label" fill="#654a31">A. Pieno smėlis</text>
    <text x="500" y="52" class="small" fill="#8b6c4d">agnezukiene.lt</text>
    <text x="500" y="104" class="h1" fill="#654a31">Rami erdvė pokalbiui</text>
    <text x="500" y="143" class="body" fill="#826d58">Labai šviesu, šilta, minkšta. Artimiausia tavo aprašytam pieno baltumo ir smėlio jausmui.</text>
    <rect x="500" y="174" width="190" height="48" rx="8" fill="#b9834f"/>
    <text x="526" y="205" class="button" fill="#fffdf8">Registruotis</text>
    <rect x="718" y="174" width="245" height="48" rx="8" fill="#efe2cf"/>
    <text x="744" y="205" class="button" fill="#654a31">Apie konsultacijas</text>
    <rect x="1010" y="42" width="350" height="190" rx="8" fill="#fffdf8" stroke="#e5d6c1"/>
    <text x="1036" y="82" class="small" fill="#b9834f">Akcentas</text>
    <text x="1036" y="122" class="body" fill="#654a31">Švelnu, jauku, bet tekstas aiškus.</text>
    <circle cx="94" cy="96" r="42" fill="#fffdf8"/>
    <circle cx="154" cy="96" r="42" fill="#f5ecdd"/>
    <circle cx="214" cy="96" r="42" fill="#efe2cf"/>
    <circle cx="274" cy="96" r="42" fill="#b9834f"/>
    <circle cx="334" cy="96" r="42" fill="#654a31"/>
    <text x="72" y="178" class="small" fill="#826d58">#FFFDF8  #F5ECDD  #EFE2CF  #B9834F  #654A31</text>
  </g>

  <!-- B -->
  <g transform="translate(80,495)" filter="url(#shadow)">
    <rect width="1440" height="285" rx="12" fill="#f7efe3"/>
    <rect x="36" y="34" width="430" height="217" rx="8" fill="#fffaf1"/>
    <rect x="0" y="0" width="1440" height="285" rx="12" fill="none" stroke="#e7d6be"/>
    <text x="36" y="-22" class="label" fill="#6a4d2c">B. Avižos ir medus</text>
    <text x="500" y="52" class="small" fill="#92724a">agnezukiene.lt</text>
    <text x="500" y="104" class="h1" fill="#6a4d2c">Šiltas, aiškus kontaktas</text>
    <text x="500" y="143" class="body" fill="#7f6b52">Truputį saulėtesnis ir gyvesnis. Gerai, jei norisi šviesos, bet ne per sterilios baltos.</text>
    <rect x="500" y="174" width="190" height="48" rx="8" fill="#c99a50"/>
    <text x="526" y="205" class="button" fill="#fffaf1">Registruotis</text>
    <rect x="718" y="174" width="245" height="48" rx="8" fill="#f0dec1"/>
    <text x="744" y="205" class="button" fill="#6a4d2c">Apie konsultacijas</text>
    <rect x="1010" y="42" width="350" height="190" rx="8" fill="#fffaf1" stroke="#e7d6be"/>
    <text x="1036" y="82" class="small" fill="#c99a50">Akcentas</text>
    <text x="1036" y="122" class="body" fill="#6a4d2c">Šilta, šviesu, kviečianti.</text>
    <circle cx="94" cy="96" r="42" fill="#fffaf1"/>
    <circle cx="154" cy="96" r="42" fill="#f7efe3"/>
    <circle cx="214" cy="96" r="42" fill="#f0dec1"/>
    <circle cx="274" cy="96" r="42" fill="#c99a50"/>
    <circle cx="334" cy="96" r="42" fill="#6a4d2c"/>
    <text x="72" y="178" class="small" fill="#7f6b52">#FFFAF1  #F7EFE3  #F0DEC1  #C99A50  #6A4D2C</text>
  </g>

  <!-- C -->
  <g transform="translate(80,820)" filter="url(#shadow)">
    <rect width="1440" height="285" rx="12" fill="#f3eadf"/>
    <rect x="36" y="34" width="430" height="217" rx="8" fill="#fffbf5"/>
    <rect x="0" y="0" width="1440" height="285" rx="12" fill="none" stroke="#e4d2bd"/>
    <text x="36" y="-22" class="label" fill="#674839">C. Molis ir kremas</text>
    <text x="500" y="52" class="small" fill="#92705f">agnezukiene.lt</text>
    <text x="500" y="104" class="h1" fill="#674839">Žmogiška ir saugu</text>
    <text x="500" y="143" class="body" fill="#7c685c">Šiltesnė, truputį labiau asmeniška. Mažiau medaus, daugiau minkšto molio.</text>
    <rect x="500" y="174" width="190" height="48" rx="8" fill="#bc7a5a"/>
    <text x="526" y="205" class="button" fill="#fffbf5">Registruotis</text>
    <rect x="718" y="174" width="245" height="48" rx="8" fill="#ead8c9"/>
    <text x="744" y="205" class="button" fill="#674839">Apie konsultacijas</text>
    <rect x="1010" y="42" width="350" height="190" rx="8" fill="#fffbf5" stroke="#e4d2bd"/>
    <text x="1036" y="82" class="small" fill="#bc7a5a">Akcentas</text>
    <text x="1036" y="122" class="body" fill="#674839">Ramu, šilta, mažiau geltonumo.</text>
    <circle cx="94" cy="96" r="42" fill="#fffbf5"/>
    <circle cx="154" cy="96" r="42" fill="#f3eadf"/>
    <circle cx="214" cy="96" r="42" fill="#ead8c9"/>
    <circle cx="274" cy="96" r="42" fill="#bc7a5a"/>
    <circle cx="334" cy="96" r="42" fill="#674839"/>
    <text x="72" y="178" class="small" fill="#7c685c">#FFFBF5  #F3EADF  #EAD8C9  #BC7A5A  #674839</text>
  </g>

  <!-- D -->
  <g transform="translate(80,1145)" filter="url(#shadow)">
    <rect width="1440" height="285" rx="12" fill="#f7f1e9"/>
    <rect x="36" y="34" width="430" height="217" rx="8" fill="#fffffb"/>
    <rect x="0" y="0" width="1440" height="285" rx="12" fill="none" stroke="#e5d8c7"/>
    <text x="36" y="-22" class="label" fill="#58462f">D. Linas ir smilga</text>
    <text x="500" y="52" class="small" fill="#7f705c">agnezukiene.lt</text>
    <text x="500" y="104" class="h1" fill="#58462f">Natūralu ir lengva</text>
    <text x="500" y="143" class="body" fill="#756958">Šviesus smėlis su vos žaliu natūraliu akcentu. Ramesnis už medų, gaivesnis už molį.</text>
    <rect x="500" y="174" width="190" height="48" rx="8" fill="#8d8b63"/>
    <text x="526" y="205" class="button" fill="#fffffb">Registruotis</text>
    <rect x="718" y="174" width="245" height="48" rx="8" fill="#e9ddc9"/>
    <text x="744" y="205" class="button" fill="#58462f">Apie konsultacijas</text>
    <rect x="1010" y="42" width="350" height="190" rx="8" fill="#fffffb" stroke="#e5d8c7"/>
    <text x="1036" y="82" class="small" fill="#8d8b63">Akcentas</text>
    <text x="1036" y="122" class="body" fill="#58462f">Labai ramus, natūralus, minkštas.</text>
    <circle cx="94" cy="96" r="42" fill="#fffffb"/>
    <circle cx="154" cy="96" r="42" fill="#f7f1e9"/>
    <circle cx="214" cy="96" r="42" fill="#e9ddc9"/>
    <circle cx="274" cy="96" r="42" fill="#8d8b63"/>
    <circle cx="334" cy="96" r="42" fill="#58462f"/>
    <text x="72" y="178" class="small" fill="#756958">#FFFFFB  #F7F1E9  #E9DDC9  #8D8B63  #58462F</text>
  </g>
</svg>
